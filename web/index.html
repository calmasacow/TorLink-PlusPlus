<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Torlink</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --tl-purple: #7B62D9;
      --tl-purple-light: #A38DF2;
      --tl-purple-muted: #766BBF;
      --tl-green: #4EBF5F;
      --tl-black: #000000;
      --tl-gray: #575657;
      --tl-white: #FFFFFF;
    }
    body {
      background: var(--tl-black);
      color: var(--tl-white);
      font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace;
    }
    .result-row:hover { background-color: rgba(123, 98, 217, 0.12); }
    .toast { animation: slideUp 0.3s ease forwards; }
    .loading-progress { animation: loadingPulse 1s ease-in-out infinite; }
    @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes loadingPulse { 0% { transform: translateX(-100%); } 50% { transform: translateX(20%); } 100% { transform: translateX(100%); } }
  </style>
</head>
<body class="bg-black text-white">
  <div class="max-w-7xl mx-auto">
    <!-- Header -->
    <div class="flex items-center justify-between px-8 py-5 border-b border-[#575657]">
      <div class="flex items-center gap-x-4">
        <img src="/torlink-logo.jpg" alt="Torlink" class="h-12 w-auto object-contain" width="242" height="64">
        <div class="hidden sm:block text-[11px] text-[#A38DF2] tracking-wide">Torznab + qBittorrent</div>
      </div>
      
      <div class="flex items-center gap-x-4 text-sm">
        <div class="flex items-center gap-x-2 bg-black px-3 py-1.5 rounded-md border border-[#575657]">
          <div class="w-2 h-2 bg-[#4EBF5F] rounded-full animate-pulse"></div>
          <span class="text-[#4EBF5F] text-xs font-medium">CONNECTED</span>
        </div>
        <div onclick="showApiKeyModal()" class="cursor-pointer flex items-center gap-x-2 text-xs px-3 py-1.5 rounded-md border border-[#575657] hover:bg-[#7B62D9]/20">
          <i class="fa-solid fa-key text-[#A38DF2]"></i>
          <span id="api-key-status" class="font-mono text-[#A38DF2]">API Key</span>
        </div>
      </div>
    </div>

    <!-- Search -->
    <div class="px-8 pt-8 pb-4">
      <div class="flex gap-3">
        <div class="flex-1">
          <input id="query" type="text" placeholder="Search movies, TV shows, anime..." 
                 class="w-full bg-black border border-[#766BBF] focus:border-[#A38DF2] transition-colors text-lg px-5 py-3.5 rounded-md outline-none placeholder:text-[#575657]"
                 onkeypress="if (event.key === 'Enter') performSearch()">
        </div>
        
        <select id="search-type" class="bg-black border border-[#766BBF] text-sm px-4 rounded-md outline-none text-white">
          <option value="movie">Movies</option>
          <option value="tvsearch">TV Shows</option>
          <option value="search">All</option>
        </select>
        
        <button onclick="performSearch()" 
                class="px-8 bg-[#7B62D9] hover:bg-[#A38DF2] hover:text-black transition-all font-medium rounded-md flex items-center gap-x-2">
          <i class="fa-solid fa-search"></i>
          <span>Search</span>
        </button>
      </div>
    </div>

    <!-- Results -->
    <div class="px-8">
      <div id="results-header" class="hidden flex items-center justify-between mb-3 px-1">
        <div class="text-sm text-[#A38DF2]">
          <span id="result-count"></span> results
        </div>
      </div>

      <div id="results-container" class="hidden bg-black border border-[#575657] rounded-md overflow-hidden">
        <table class="w-full table-fixed">
          <colgroup>
            <col>
            <col style="width: 72px;">
            <col style="width: 88px;">
            <col style="width: 72px;">
            <col style="width: 64px;">
            <col style="width: 112px;">
          </colgroup>
          <thead class="bg-black border-b border-[#575657] text-xs">
            <tr>
              <th class="text-left py-3.5 px-4 font-medium text-[#A38DF2]">Title</th>
              <th class="text-left py-3.5 px-2 font-medium text-[#A38DF2]">Source</th>
              <th class="text-right py-3.5 px-2 font-medium text-[#A38DF2]">Size</th>
              <th class="text-center py-3.5 px-2 font-medium text-[#A38DF2]">Seeders</th>
              <th class="text-center py-3.5 px-2 font-medium text-[#A38DF2]">Peers</th>
              <th class="text-center py-3.5 px-2 font-medium text-[#A38DF2]">Actions</th>
            </tr>
          </thead>
          <tbody id="results-body" class="text-sm divide-y divide-[#575657]"></tbody>
        </table>
      </div>

      <!-- Empty / Loading state -->
      <div id="empty-state" class="flex flex-col items-center justify-center py-16 text-center">
        <i class="fa-solid fa-search text-5xl text-[#766BBF] mb-4"></i>
        <div class="text-lg text-[#A38DF2]">Search for movies, TV shows or anime</div>
        <div class="text-xs text-[#575657] mt-1">If searches say Unauthorized, click Set API Key in the top right first.</div>
      </div>
    </div>
  </div>

  <!-- Toast container -->
  <div id="toast-container" class="fixed bottom-6 right-6 z-50 flex flex-col gap-2"></div>

  <script>
    const API_BASE = window.location.origin;
    
    function getApiKey() {
      return localStorage.getItem('torlink_api_key') || '';
    }
    
    function setApiKey(key) {
      localStorage.setItem('torlink_api_key', key);
      updateApiKeyStatus();
    }
    
    function updateApiKeyStatus() {
      const el = document.getElementById('api-key-status');
      const key = getApiKey();
      if (key) {
        el.textContent = key.substring(0, 8) + '...';
        el.style.color = '#4EBF5F';
      } else {
        el.textContent = 'Set API Key';
        el.style.color = '#A38DF2';
      }
    }
    
    function showApiKeyModal() {
      const current = getApiKey();
      const key = prompt('Enter your Torlink API Key:', current);
      if (key !== null) {
        setApiKey(key.trim());
      }
    }
    
    function showToast(message, type = 'success') {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      
      const bg = type === 'success' ? 'bg-[#4EBF5F] text-black' : type === 'error' ? 'bg-red-600 text-white' : 'bg-[#575657] text-white';
      const icon = type === 'success' ? 'fa-check' : type === 'error' ? 'fa-exclamation' : 'fa-info';
      
      toast.className = `toast flex items-center gap-x-3 px-5 py-3 rounded-md text-sm ${bg}`;
      toast.innerHTML = `
        <i class="fa-solid ${icon}"></i>
        <span>${message}</span>
      `;
      
      container.appendChild(toast);
      
      setTimeout(() => {
        toast.style.transition = 'all 0.2s';
        toast.style.opacity = '0';
        setTimeout(() => toast.remove(), 200);
      }, 2800);
    }
    
    async function performSearch() {
      const query = document.getElementById('query').value.trim();
      if (!query) return;
      
      const type = document.getElementById('search-type').value;
      const container = document.getElementById('results-container');
      const empty = document.getElementById('empty-state');
      const header = document.getElementById('results-header');
      
      empty.classList.add('hidden');
      container.classList.add('hidden');
      header.classList.add('hidden');
      
      // Show loading with local animation plus JS-updated text so activity is obvious.
      document.getElementById('loading-state')?.remove();
      const loading = document.createElement('div');
      loading.id = 'loading-state';
      loading.className = 'flex flex-col items-center justify-center gap-3 py-12 text-[#A38DF2]';
      loading.innerHTML = `
        <div class="w-52 h-2 bg-black rounded-sm overflow-hidden border border-[#575657]">
          <div class="loading-progress h-full w-1/2 bg-[#4EBF5F] rounded-sm"></div>
        </div>
        <div id="loading-message" class="text-sm font-medium">Searching Torlink<span id="loading-dots">.</span></div>
        <div id="loading-elapsed" class="text-xs text-[#575657]">0.0s elapsed</div>
      `;
      document.querySelector('#results-container').parentNode.appendChild(loading);
      
      const loadingStarted = Date.now();
      const loadingTimer = setInterval(() => {
        const elapsed = (Date.now() - loadingStarted) / 1000;
        const dots = '.'.repeat((Math.floor(elapsed * 2) % 3) + 1);
        loading.querySelector('#loading-dots').textContent = dots;
        loading.querySelector('#loading-elapsed').textContent = `${elapsed.toFixed(1)}s elapsed`;
      }, 250);

      try {
        const params = new URLSearchParams({
          q: query,
          t: type,
          extended: '1',
          limit: '100'
        });
        
        const headers = {};
        const apiKey = getApiKey();
        if (apiKey) headers['X-Api-Key'] = apiKey;
        
        const res = await fetch(`${API_BASE}/api?${params}`, { headers });
        
        if (res.status === 401) {
          showApiKeyModal();
          throw new Error('Unauthorized: click Set API Key and paste your Torlink API key, then search again.');
        }

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error || `HTTP ${res.status}`);
        }
        
        const text = await res.text();
        const parser = new DOMParser();
        const xml = parser.parseFromString(text, 'text/xml');
        
        const items = Array.from(xml.querySelectorAll('item'));
        
        renderResults(items);
        
      } catch (err) {
        showToast(err.message || 'Search failed', 'error');
        empty.classList.remove('hidden');
      } finally {
        clearInterval(loadingTimer);
        const loadingEl = document.getElementById('loading-state');
        if (loadingEl) loadingEl.remove();
      }
    }
    
    function renderResults(items) {
      const tbody = document.getElementById('results-body');
      const container = document.getElementById('results-container');
      const empty = document.getElementById('empty-state');
      const header = document.getElementById('results-header');
      
      tbody.innerHTML = '';
      
      if (items.length === 0) {
        empty.classList.remove('hidden');
        container.classList.add('hidden');
        header.classList.add('hidden');
        return;
      }
      
      header.classList.remove('hidden');
      container.classList.remove('hidden');
      empty.classList.add('hidden');
      
      document.getElementById('result-count').textContent = items.length;
      
      items.forEach(item => {
        const title = item.querySelector('title')?.textContent || 'Unknown';
        const size = parseInt(item.querySelector('size')?.textContent || '0');
        const seeders = getTorznabAttr(item, 'seeders') || '0';
        const peers = getTorznabAttr(item, 'peers') || '0';
        const magnet = getTorznabAttr(item, 'magneturl') || '';
        const category = item.querySelector('category')?.textContent || '';

        const source = title.includes('[') ? title.split('[').pop().split(']')[0] : '—';
        
        const tr = document.createElement('tr');
        tr.className = 'result-row border-b border-[#575657] last:border-0';
        
        tr.innerHTML = `
          <td class="px-4 py-4 text-sm leading-tight min-w-0">
            <div class="line-clamp-2">${escapeHtml(title)}</div>
          </td>
          <td class="px-2 py-4 text-xs text-[#575657] font-mono truncate">${escapeHtml(source)}</td>
          <td class="px-2 py-4 text-right font-mono text-xs text-[#575657] whitespace-nowrap">${formatBytes(size)}</td>
          <td class="px-2 py-4 text-center">
            <span class="inline-flex items-center justify-center font-mono text-xs text-[#4EBF5F]">${seeders}</span>
          </td>
          <td class="px-2 py-4 text-center">
            <span class="inline-flex items-center justify-center font-mono text-xs text-[#A38DF2]">${peers}</span>
          </td>
          <td class="px-1 py-4 overflow-hidden">
            <div class="flex w-full justify-center gap-x-1 whitespace-nowrap overflow-hidden">
              <button onclick="copyMagnet('${escapeHtml(magnet)}')" 
                      class="px-1.5 py-1.5 text-[11px] rounded-md border border-[#575657] hover:bg-[#7B62D9]/20 flex items-center justify-center transition-colors" title="Copy magnet">
                <i class="fa-solid fa-copy"></i>
              </button>
              <button onclick="sendToQbit('${escapeHtml(magnet)}')" 
                      class="px-1.5 py-1.5 text-[11px] rounded-md bg-[#7B62D9] hover:bg-[#A38DF2] hover:text-black flex items-center gap-x-1 transition-colors" title="Send to qBittorrent">
                <i class="fa-solid fa-download"></i>
                <span>QBT</span>
              </button>
            </div>
          </td>
        `;
        
        tbody.appendChild(tr);
      });
    }

    function getTorznabAttr(item, name) {
      const attrs = item.getElementsByTagName('torznab:attr');
      for (const attr of attrs) {
        if (attr.getAttribute('name') === name) return attr.getAttribute('value') || '';
      }
      return '';
    }
    
    function escapeHtml(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }
    
    function formatBytes(bytes) {
      if (!bytes || bytes === 0) return '—';
      const k = 1024;
      const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
    }
    
    async function copyMagnet(magnet) {
      if (!magnet) {
        showToast('No magnet link available', 'error');
        return;
      }
      try {
        await navigator.clipboard.writeText(magnet);
        showToast('Magnet copied to clipboard');
      } catch (e) {
        showToast('Failed to copy', 'error');
      }
    }
    
    async function sendToQbit(magnet) {
      if (!magnet) {
        showToast('No magnet link available', 'error');
        return;
      }
      
      const apiKey = getApiKey();
      const headers = { 'Content-Type': 'application/json' };
      if (apiKey) headers['X-Api-Key'] = apiKey;
      
      try {
        const res = await fetch(`${API_BASE}/api/qbit/add`, {
          method: 'POST',
          headers,
          body: JSON.stringify({ magnet })
        });
        
        const data = await res.json();
        
        if (res.ok) {
          showToast('Sent to qBittorrent successfully!', 'success');
        } else {
          showToast(data.error || 'Failed to send', 'error');
        }
      } catch (err) {
        showToast('Network error', 'error');
      }
    }
    
    // Init
    function init() {
      updateApiKeyStatus();
      
      // Demo hint
      const queryInput = document.getElementById('query');
      queryInput.placeholder = "Try 'avatar' or 'the last of us'";
    }
    
    window.onload = init;
  </script>
</body>
</html>
